name: Crear APK Web Directo Gratis

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Java y Android SDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Instalar Herramienta de Empaquetado Ligera
      run: |
        npm install -g @techiediaries/bnd
        npm install -g @cli-packager/android || true

    - name: Crear Estructura de la App
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp -r * www/ 2>/dev/null || true

    - name: Descargar Compilador Independiente
      run: |
        # Usamos un empaquetador nativo preconfigurado para evitar errores de SDK
        git clone https://github.com/hayanisaid/Webview-APK-Container.git android-builder
        cd android-builder
        rm -rf app/src/main/assets/*
        cp -r ../www/* app/src/main/assets/
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Subir el APK Listo
      uses: actions/upload-artifact@v4
      with:
        name: Real-Cleaner-Gratis-APK
        path: android-builder/app/build/outputs/apk/debug/app-debug.apk
