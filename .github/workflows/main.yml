name: Convertir Web a APK Directo

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el proyecto
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar herramientas de empaquetado
      run: |
        npm install -g cordova
        npm install -g bubblewrap

    - name: Crear estructura de la App
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp -r * www/ 2>/dev/null || true

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar e instalar Cordova Android
      run: |
        cordova create android-app com.gchiluisar.realcleaner "Real Cleaner"
        cd android-app
        rm -rf www
        cp -r ../www .
        cordova platform add android
        cordova build android --device

    - name: Subir el APK Generado
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Aplicacion-RAM
        path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
