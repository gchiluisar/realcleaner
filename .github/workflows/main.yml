name: Convertir App Web a APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Instalar dependencias y Construir Web
      run: |
        npm install
        npm run build --if-present

    - name: Instalar convertidor (Capacitor)
      run: |
        npm install @capacitor/core @capacitor/cli
        npx cap init "Real Cleaner" "com.gchiluisar.realcleaner" --web-dir=dist --web-dir=build --web-dir=.
        npm install @capacitor/android
        npx cap add android

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Sincronizar y Compilar APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Subir tu APK Listo
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Aplicacion-RAM
        path: android/app/build/outputs/apk/debug/app-debug.apk
