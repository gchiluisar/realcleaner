name: APK Definitivo con Capacitor

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el proyecto
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Instalar dependencias y Compilar Web
      run: |
        npm install
        npm run build --if-present

    - name: Crear carpeta de respaldo si Vite no la creó
      run: |
        # Si Vite no generó 'dist', creamos la carpeta y metemos los archivos raíz
        if [ ! -d "dist" ]; then
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || true
          cp -r assets dist/ 2>/dev/null || true
          cp -r src dist/ 2>/dev/null || true
          cp * dist/ 2>/dev/null || true
        fi

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inicializar Capacitor y Crear entorno Android
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Real Cleaner" "com.gchiluisar.realcleaner" --web-dir=dist
        npx cap add android

    - name: Sincronizar archivos web con Android
      run: npx cap sync android

    - name: Compilar APK Nativo
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Subir el APK Listo para Usar
      uses: actions/upload-artifact@v4
      with:
        name: Real-Cleaner-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
